<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý Đối Tượng Trung tâm Bảo trợ Xã hội Tân Hiệp</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

input, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    font-size: 14px;
    text-align: center;
    white-space: nowrap;
}

th { background: #f2f2f2; }

.container {
    max-height:70vh;
    overflow-y:auto;
}

/* STT */
th:nth-child(1), td:nth-child(1) {
    width:40px;
    text-align:center;
}

/* Họ tên */
th:nth-child(2), td:nth-child(2) {
    width:120px;
    text-align:left;
}

/* Năm sinh */
th:nth-child(3), td:nth-child(3) {
    width:70px;
}

/* Ngày nhập */
th:nth-child(4), td:nth-child(4) {
    width:100px;
}

/* Nhà */
th:nth-child(5), td:nth-child(5) {
    width:50px;
}

/* Chẩn đoán */
th:nth-child(6), td:nth-child(6) {
    width:100px;
}

/* Thuốc */
th:nth-child(7), td:nth-child(7) {
    width:120px;
}

/* BHYT */
th:nth-child(8), td:nth-child(8) {
    width:140px;
}

/* Hành động */
th:nth-child(9), td:nth-child(9) {
    width:80px;
}
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<input type="password" id="adminPass" placeholder="Mật khẩu admin">
<button onclick="loginAdmin()">Đăng nhập admin</button>

<br>

<input id="ten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
    <input id="ngaynhap" type="date">
<input id="nha" placeholder="Nhà">
<input id="chandoan" placeholder="Chẩn đoán">
<input id="thuoc" placeholder="Thuốc">
<input id="bhyt" placeholder="Số thẻ BHYT">

<br>

<button id="btnAdd" onclick="them()" disabled>Thêm</button>
<button id="btnEdit" onclick="capNhat()" disabled>Cập nhật</button>
<button onclick="xuatExcel()">Xuất Excel</button>

<button onclick="locBHYT()">Chỉ có BHYT</button>
<button onclick="locChuaBHYT()">Chưa có BHYT</button>
<button onclick="hienTatCa()">Hiện tất cả</button>
<button onclick="xuatExcelBHYT()">Xuất Excel BHYT</button>

<h3>
Tổng: <span id="tongBN">0</span> | 
Có BHYT: <span id="coBHYT">0</span> | 
Chưa có BHYT: <span id="chuaBHYT">0</span>
</h3>

<button onclick="moThongKe()">
📊 Xem thống kê chẩn đoán
</button>

<div id="tongCD" style="
display:none;
margin-top:10px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
">
</div>

<div class="container">
<table>
<thead>
<tr>
    <th>STT</th>
<th>Họ tên<br><input id="f_ten" onkeyup="locCot()"></th>
<th>Năm sinh<br><input id="f_namsinh" onkeyup="locCot()"></th>
    <th>Ngày nhập TT<br><input id="f_ngaynhap" onkeyup="locCot()"></th>
<th>Nhà<br><input id="f_nha" onkeyup="locCot()"></th>
<th>Chẩn đoán<br><input id="f_cd" onkeyup="locCot()"></th>
<th>Thuốc<br><input id="f_thuoc" onkeyup="locCot()"></th>
<th>BHYT<br><input id="f_bhyt" onkeyup="locCot()"></th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="dulieu"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ql-benhnhan.firebaseapp.com",
  projectId: "ql-benhnhan",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ds = [];
let idSua = null;
let isAdmin = false;

// LOAD
async function loadData() {
    const snap = await getDocs(collection(db, "benhnhan"));
    ds = [];
    snap.forEach(d => ds.push({ id: d.id, ...d.data() }));
    hienThi(ds);
}

// DATA
function layData() {
    return {
        ten: ten.value,
        namsinh: namsinh.value,
        ngaynhap: ngaynhap.value,
        nha: nha.value,
        chandoan: chandoan.value,
        thuoc: thuoc.value,
        bhyt: bhyt.value
    };
}

// LOGIN
window.loginAdmin = function () {
    if (adminPass.value === "571810") {
        isAdmin = true;
        btnAdd.disabled = false;
        btnEdit.disabled = false;
        alert("Đã vào admin");
    } else alert("Sai mật khẩu");
};

// ADD
window.them = async function () {
    if (!isAdmin) return alert("Không có quyền!");
    await addDoc(collection(db, "benhnhan"), layData());
    clearForm();
    loadData();
};

// DELETE
window.xoa = async function (id) {
    if (!isAdmin) return alert("Không có quyền!");
    await deleteDoc(doc(db, "benhnhan", id));
    loadData();
};

// EDIT
window.sua = function (id) {
    let p = ds.find(x => x.id == id);
    ten.value = p.ten;
    namsinh.value = p.namsinh;
    nha.value = p.nha;
    ngaynhap.value = p.ngaynhap || "";
    chandoan.value = p.chandoan;
    thuoc.value = p.thuoc;
    bhyt.value = p.bhyt;
    idSua = id;
};

// UPDATE
window.capNhat = async function () {
    if (!isAdmin) return alert("Không có quyền!");
    await updateDoc(doc(db, "benhnhan", idSua), layData());
    idSua = null;
    clearForm();
    loadData();
};

// 🔥 XỬ LÝ CHUỖI SIÊU MẠNH (FIX MỌI LỖI)
function xuLy(str) {
    return (str || "")
        .toLowerCase()
        .replace(/đ/g, "d")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

// FILTER
window.locCot = function () {

    let key = xuLy(f_ten.value);

    let f = ds.filter(p => {

        let ten = xuLy(p.ten);

        let matchTen = ten.indexOf(key) !== -1;

        return matchTen &&
            xuLy(p.namsinh).includes(xuLy(f_namsinh.value)) &&
            (f_nha.value.trim() === "" || xuLy(p.nha) === xuLy(f_nha.value)) &&
            xuLy(p.chandoan).includes(xuLy(f_cd.value)) &&
            xuLy(p.thuoc).includes(xuLy(f_thuoc.value)) &&
            xuLy(p.bhyt).includes(xuLy(f_bhyt.value));
    });

    hienThi(f);
}

// LỌC BHYT
window.locBHYT = () => hienThi(ds.filter(p => p.bhyt && p.bhyt.trim() !== ""));
window.locChuaBHYT = () => hienThi(ds.filter(p => !p.bhyt || p.bhyt.trim() === ""));
window.hienTatCa = () => hienThi(ds);
function doiNgay(date){
    if(!date) return "";
    let a = date.split("-");
    return a[2] + "/" + a[1] + "/" + a[0];
}
    window.moThongKe = function(){

    let box = document.getElementById("tongCD");

    if(box.style.display === "none"){
        box.style.display = "block";
    }
    else{
        box.style.display = "none";
    }

}
// HIỂN THỊ
function hienThi(data) {
    let html = "";

    let stt = 1;

    data.forEach(p => {
        html += `
        <tr>
    <td>${stt}</td>
    <td>${p.ten || ""}</td>
            <td>${p.namsinh || ""}</td>
            <td>${doiNgay(p.ngaynhap)}</td>
            <td>${p.nha || ""}</td>
            <td>${p.chandoan || ""}</td>
            <td>${p.thuoc || ""}</td>
            <td>${p.bhyt || ""}</td>
            <td>
                <button onclick="sua('${p.id}')">Sửa</button>
                <button onclick="xoa('${p.id}')">Xoá</button>
            </td>
        </tr>`;
        stt++;
    });

    dulieu.innerHTML = html;

    tongBN.innerText = data.length;
    let co = data.filter(p => p.bhyt && p.bhyt.trim() !== "").length;
    coBHYT.innerText = co;
    chuaBHYT.innerText = data.length - co;

    let soCD = {};
    data.forEach(p => {
        let cd = p.chandoan || "Không rõ";
        soCD[cd] = (soCD[cd] || 0) + 1;
    });

 let text = `
<div style="
font-weight:bold;
font-size:16px;
margin-bottom:8px;">
📊 Thống kê chẩn đoán
</div>

<div style="
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
font-size:14px;
">
`;

for (let k in soCD) {

    text += `
    <div style="
    padding:8px;
    border:1px solid #ddd;
    border-radius:8px;
    text-align:center;">
    
    <b>${k}</b><br>
    ${soCD[k]}

    </div>
    `;

}

text += "</div>";

tongCD.innerHTML = text;
}
// CLEAR
function clearForm() {
    ten.value = "";
    namsinh.value = "";
    ngaynhap.value = "";
    nha.value = "";
    chandoan.value = "";
    thuoc.value = "";
    bhyt.value = "";
}

// EXCEL
window.xuatExcel = function () {
    let table = document.querySelector("table");
    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.table_to_sheet(table);
    XLSX.utils.book_append_sheet(wb, ws, "Danh sách");
    XLSX.writeFile(wb, "benhnhan.xlsx");
};

// EXCEL BHYT
window.xuatExcelBHYT = function () {
    let data = ds.filter(p => p.bhyt && p.bhyt.trim() !== "");

    let rows = [["Họ tên","Năm sinh","Nhà","Chẩn đoán","Thuốc","BHYT"]];
    data.forEach(p => {
        rows.push([p.ten,p.namsinh,p.nha,p.chandoan,p.thuoc,p.bhyt]);
    });

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, "BHYT");

    XLSX.writeFile(wb, "benhnhan_BHYT.xlsx");
};

window.onload = loadData;
</script>

</body>
</html>
