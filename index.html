<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý bệnh nhân</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

input, button {
    padding: 6px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    font-size: 14px;
    text-align: center;
    white-space: nowrap;
}

th { background: #f2f2f2; }

.container {
    max-height: 420px;
    overflow-y: auto;
}
</style>
</head>

<body>

<h2>Quản lý bệnh nhân</h2>

<input type="password" id="adminPass" placeholder="Mật khẩu admin">
<button onclick="loginAdmin()">Đăng nhập admin</button>

<br>

<input id="ten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="chandoan" placeholder="Chẩn đoán">
<input id="thuoc" placeholder="Thuốc">
<input id="bhyt" placeholder="Số thẻ BHYT">

<br>

<button id="btnAdd" onclick="them()" disabled>Thêm</button>
<button id="btnEdit" onclick="capNhat()" disabled>Cập nhật</button>

<button onclick="xuatExcel()">Xuất Excel</button>
<button onclick="xuatExcelBHYT()">Excel BHYT</button>

<h3>
Tổng: <span id="tongBN">0</span> | 
Có BHYT: <span id="coBHYT">0</span> | 
Chưa BHYT: <span id="chuaBHYT">0</span>
</h3>

<div class="container">
<table>
<thead>
<tr>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Chẩn đoán</th>
<th>Thuốc</th>
<th>BHYT</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="dulieu"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== FIREBASE CONFIG (PHẢI ĐÚNG 100%) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDaWhoXqZGx-DLbwJYFghlL2FyiJrLjOA",
  authDomain: "ql-benhnhan.firebaseapp.com",
  projectId: "ql-benhnhan",
  storageBucket: "ql-benhnhan.firebasestorage.app",
  messagingSenderId: "205264705273",
  appId: "1:205264705273:web:071eef6ee888a9a6907428",
  measurementId: "G-C7BF0H43VF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ds = [];
let idSua = null;
let isAdmin = false;

/* ===== LOAD DATA ===== */
async function loadData() {
    try {
        const snap = await getDocs(collection(db, "benhnhan"));
        ds = [];
        snap.forEach(d => ds.push({ id: d.id, ...d.data() }));
        hienThi(ds);
        console.log("LOAD OK:", ds.length);
    } catch (e) {
        console.error("LOAD ERROR:", e);
        alert("Lỗi tải dữ liệu Firebase");
    }
}

/* ===== LẤY DATA FORM ===== */
function layData() {
    return {
        ten: ten.value,
        namsinh: namsinh.value,
        nha: nha.value,
        chandoan: chandoan.value,
        thuoc: thuoc.value,
        bhyt: bhyt.value
    };
}

/* ===== LOGIN ADMIN ===== */
window.loginAdmin = function () {
    if (adminPass.value === "571810") {
        isAdmin = true;
        btnAdd.disabled = false;
        btnEdit.disabled = false;
        alert("Đăng nhập admin thành công");
    } else {
        alert("Sai mật khẩu");
    }
};

/* ===== THÊM ===== */
window.them = async function () {
    if (!isAdmin) return alert("Không có quyền!");
    try {
        await addDoc(collection(db, "benhnhan"), layData());
        clearForm();
        loadData();
    } catch (e) {
        console.error(e);
        alert("Lỗi thêm dữ liệu");
    }
};

/* ===== XOÁ ===== */
window.xoa = async function (id) {
    if (!isAdmin) return alert("Không có quyền!");
    await deleteDoc(doc(db, "benhnhan", id));
    loadData();
};

/* ===== SỬA ===== */
window.sua = function (id) {
    let p = ds.find(x => x.id == id);
    ten.value = p.ten;
    namsinh.value = p.namsinh;
    nha.value = p.nha;
    chandoan.value = p.chandoan;
    thuoc.value = p.thuoc;
    bhyt.value = p.bhyt;
    idSua = id;
};

/* ===== CẬP NHẬT ===== */
window.capNhat = async function () {
    if (!isAdmin) return alert("Không có quyền!");
    await updateDoc(doc(db, "benhnhan", idSua), layData());
    idSua = null;
    clearForm();
    loadData();
};

/* ===== HIỂN THỊ ===== */
function hienThi(data) {
    let html = "";

    data.forEach(p => {
        html += `
        <tr>
            <td>${p.ten || ""}</td>
            <td>${p.namsinh || ""}</td>
            <td>${p.nha || ""}</td>
            <td>${p.chandoan || ""}</td>
            <td>${p.thuoc || ""}</td>
            <td>${p.bhyt || ""}</td>
            <td>
                <button onclick="sua('${p.id}')">Sửa</button>
                <button onclick="xoa('${p.id}')">Xoá</button>
            </td>
        </tr>`;
    });

    dulieu.innerHTML = html;

    tongBN.innerText = data.length;
    let co = data.filter(p => p.bhyt && p.bhyt.trim() !== "").length;
    coBHYT.innerText = co;
    chuaBHYT.innerText = data.length - co;
}

/* ===== CLEAR FORM ===== */
function clearForm() {
    ten.value = "";
    namsinh.value = "";
    nha.value = "";
    chandoan.value = "";
    thuoc.value = "";
    bhyt.value = "";
}

/* ===== EXCEL ===== */
window.xuatExcel = function () {
    let table = document.querySelector("table");
    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.table_to_sheet(table);
    XLSX.utils.book_append_sheet(wb, ws, "DS");
    XLSX.writeFile(wb, "benhnhan.xlsx");
};

window.xuatExcelBHYT = function () {
    let data = ds.filter(p => p.bhyt && p.bhyt.trim() !== "");
    let rows = [["Họ tên","Năm sinh","Nhà","Chẩn đoán","Thuốc","BHYT"]];
    data.forEach(p => rows.push([p.ten,p.namsinh,p.nha,p.chandoan,p.thuoc,p.bhyt]));

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, "BHYT");
    XLSX.writeFile(wb, "benhnhan_BHYT.xlsx");
};

/* ===== START ===== */
window.onload = loadData;

</script>

</body>
</html>
